<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Crect x='6' y='20' width='4' height='6' rx='1' fill='white'/%3E%3Crect x='12' y='14' width='4' height='12' rx='1' fill='white'/%3E%3Crect x='18' y='8' width='4' height='18' rx='1' fill='white'/%3E%3Crect x='24' y='12' width='4' height='14' rx='1' fill='%2393c5fd'/%3E%3C/svg%3E">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitor de Cumplimiento — Cerezo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar:#1f2733;--sidebar-w:64px;
  --bg:#f5f6f8;--white:#ffffff;--cream:#fbfaf7;
  --border:#e7eaef;--txt:#1f2530;--muted:#7c8696;
  --blue:#2563eb;--blue-soft:#dbeafe;
  --red:#dc2626;--red-soft:#fee2e2;
  --orange:#ea580c;--orange-soft:#ffedd5;
  --teal:#0d9488;--teal-soft:#d5f5f1;
  --green:#16a34a;--green-soft:#dcfce7;
  --amber:#d97706;--amber-soft:#fef3c7;
  --radius:14px;--radius-sm:9px;
  --shadow:0 1px 14px rgba(31,37,48,.06);
  --rowline:#f0f3f7;--soft:#f8fafc;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);display:flex}

/* SIDEBAR */
nav.sidebar{width:var(--sidebar-w);background:var(--sidebar);display:flex;flex-direction:column;
  align-items:center;padding:18px 0;gap:6px;flex-shrink:0;z-index:50}
nav.sidebar .logo{width:38px;height:38px;border-radius:11px;
  background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;
  justify-content:center;font-size:17px;margin-bottom:14px}
.nav-item{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  color:#9aa4b3;cursor:pointer;transition:all .15s;font-size:17px}
.nav-item:hover{background:rgba(255,255,255,.08);color:#fff}
.nav-item.active{background:rgba(37,99,235,.22);color:#7fb0ff}
.nav-sep{flex:1}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{padding:14px 24px;display:flex;align-items:center;gap:14px;background:var(--white);
  border-bottom:1px solid var(--border);flex-shrink:0}
.topbar-title h1{font-size:20px;font-weight:800;letter-spacing:-.02em;color:var(--txt)}
.topbar-title h1 b{color:var(--blue)}
.topbar-title p{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-gap{flex:1}
.live-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:20px;
  background:var(--teal-soft);font-size:11px;font-weight:700;color:var(--teal)}
.dot-live{width:7px;height:7px;border-radius:50%;background:var(--teal);animation:pulse 1.8s infinite}
.live-pill.offline{background:var(--orange-soft);color:var(--orange)}
.live-pill.offline .dot-live{background:var(--orange);animation:none}
.live-pill.sb-ok{background:var(--blue-soft);color:var(--blue)}
.live-pill.sb-ok .dot-live{background:var(--blue)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(13,148,136,.5)}50%{box-shadow:0 0 0 5px rgba(13,148,136,0)}}

.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* IMPORT / DATA STRIP */
.data-strip{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:var(--white);
  border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.data-strip .stat{display:flex;flex-direction:column;gap:1px;padding-right:16px;border-right:1px solid var(--border)}
.data-strip .stat:last-of-type{border-right:none}
.data-strip .stat b{font-size:18px;font-weight:800;color:var(--blue)}
.data-strip .stat span{font-size:10.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 16px;border-radius:var(--radius-sm);
  font-size:12.5px;font-weight:700;cursor:pointer;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.btn:active{transform:translateY(1px)}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1d4ed8}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:#0b7d72}
.btn-orange{background:var(--orange);color:#fff}.btn-orange:hover{background:#c2410c}
.btn-ghost{background:var(--white);color:var(--txt);border-color:var(--border)}.btn-ghost:hover{border-color:var(--blue);color:var(--blue)}
.btn-red{background:var(--white);color:var(--red);border-color:var(--red-soft)}.btn-red:hover{background:var(--red-soft)}
.btn[disabled]{opacity:.45;cursor:not-allowed;transform:none}
.staged-chip{display:inline-flex;align-items:center;gap:8px;background:var(--amber-soft);
  border:1px solid #fcd34d;border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;font-weight:700;color:var(--amber)}
.staged-chip .x{cursor:pointer;color:var(--red);font-weight:800}
#file-input{display:none}
.prog{height:3px;background:var(--border);border-radius:2px;overflow:hidden;display:none}
.prog>div{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--teal));transition:width .3s}

/* FILTERS */
.filters{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;background:var(--white);
  border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.fg select,.fg input{padding:8px 11px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--white);font-size:12.5px;color:var(--txt);font-family:inherit;min-width:130px}
.fg select:focus,.fg input:focus{outline:2px solid var(--blue);border-color:var(--blue)}
.quick-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.qbtn{padding:7px 13px;border-radius:20px;border:1px solid var(--border);background:var(--white);
  color:var(--muted);cursor:pointer;font-size:11.5px;font-weight:700;transition:all .15s}
.qbtn:hover{border-color:var(--blue);color:var(--blue)}
.qbtn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.filters-spacer{flex:1}
#rec-count{font-size:11px;color:var(--muted);font-weight:600}

/* SECTION LABEL */
.slbl{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:800;color:var(--txt);
  text-transform:uppercase;letter-spacing:.04em}
.slbl .dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:15px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px}
.kpi-card.k-blue::before{background:var(--blue)}
.kpi-card.k-teal::before{background:var(--teal)}
.kpi-card.k-orange::before{background:var(--orange)}
.kpi-card.k-red::before{background:var(--red)}
.kpi-card.k-green::before{background:var(--green)}
.kpi-top{display:flex;align-items:center;justify-content:space-between}
.kpi-lbl{font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.kpi-ico{font-size:16px}
.kpi-val{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-top:7px;color:var(--txt)}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:5px}
.delta{font-weight:800;font-size:11px}
.delta.up{color:var(--blue)}      /* positivo = azul */
.delta.down{color:var(--red)}     /* negativo = rojo */
.delta.flat{color:var(--muted)}

/* KPI CONFIG MODAL */
.kpi-cfg-overlay{position:fixed;inset:0;background:rgba(31,37,48,.5);display:none;align-items:center;justify-content:center;z-index:300;padding:20px}
.kpi-cfg-overlay.show{display:flex}
.kpi-cfg-modal{background:var(--white);border-radius:18px;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.kpi-cfg-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.kpi-cfg-hdr h3{font-size:15px;font-weight:800;flex:1}
.kpi-cfg-body{overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.kpi-cfg-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer;transition:all .15s;user-select:none}
.kpi-cfg-item:hover{border-color:var(--blue);background:var(--blue-soft)}
.kpi-cfg-item.checked{border-color:var(--blue);background:#eff6ff}
.kpi-cfg-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
.kpi-cfg-ico{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.kpi-cfg-txt{flex:1;font-size:12.5px;font-weight:700;color:var(--txt)}
.kpi-cfg-sub{font-size:10.5px;color:var(--muted);font-weight:500}
.kpi-cfg-ftr{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.kpi-cfg-sep{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:4px 0 2px;border-bottom:1px solid var(--rowline);margin-bottom:4px}
.kpi-gear-btn{background:none;border:1px solid var(--border);border-radius:7px;padding:3px 8px;font-size:12px;cursor:pointer;color:var(--muted);transition:all .15s;margin-left:auto}
.kpi-gear-btn:hover{border-color:var(--blue);color:var(--blue)}

/* TASK INSIGHT */
.insight-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.insight-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow)}
.insight-card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--rowline)}
.insight-card-hdr .ico{font-size:15px}
.insight-card-hdr .ttl{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.insight-row{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid var(--rowline)}
.insight-row:last-child{border-bottom:none}
.insight-rank{width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;color:#fff;flex-shrink:0}
.insight-name{font-size:11.5px;color:var(--txt);font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.insight-chip{font-size:10px;font-weight:800;border-radius:5px;padding:2px 7px;flex-shrink:0}
.insight-empty{font-size:12px;color:var(--muted);text-align:center;padding:20px 0}
@media(max-width:760px){.insight-grid{grid-template-columns:1fr}}

/* CARDS / CHARTS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;box-shadow:var(--shadow)}
.card-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.card-title{font-size:13.5px;font-weight:800;color:var(--txt);display:flex;align-items:center;gap:7px}
.ct-dot{width:9px;height:9px;border-radius:3px}
.card-note{margin-left:auto;font-size:11px;font-weight:700;color:var(--muted)}
.chart-wrap{position:relative;height:215px}

/* RANKING */
.rank-item{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:1px solid var(--rowline)}
.rank-item:last-child{border-bottom:none}
.rank-num{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:#fff;flex-shrink:0}
.rank-name{font-size:12.5px;font-weight:700;color:var(--txt);flex:1;min-width:0}
.rank-name small{display:block;font-size:10px;color:var(--muted);font-weight:600}
.rank-bar-wrap{display:flex;align-items:center;gap:8px;width:150px}
.rank-bg{flex:1;height:8px;background:var(--rowline);border-radius:4px;overflow:hidden}
.rank-fill{height:100%;border-radius:4px;transition:width .6s ease}
.rank-pct{font-size:12px;font-weight:800;width:42px;text-align:right}

/* DONUT LEGEND */
.donut-legend{display:flex;flex-direction:column;gap:9px}
.legend-item{display:flex;align-items:center;gap:8px;font-size:12px}
.legend-dot{width:11px;height:11px;border-radius:3px}
.legend-lbl{color:var(--txt);font-weight:600}
.legend-val{margin-left:auto;font-weight:800;color:var(--txt)}

/* TABLES */
.tbl-scroll{overflow-x:auto}
table.dt{width:100%;border-collapse:collapse;min-width:640px}
table.dt thead th{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;
  padding:10px 12px;text-align:left;background:var(--soft);border-bottom:2px solid var(--border);
  white-space:nowrap;color:var(--muted)}
table.dt thead th.c{text-align:center}
table.dt tbody td{padding:9px 12px;border-bottom:1px solid var(--rowline);font-size:12px;
  color:var(--txt);white-space:nowrap}
table.dt tbody tr:hover{background:var(--soft)}
table.dt tbody tr:last-child td{border-bottom:none}
.tname{font-weight:700;color:var(--txt)}
.tsub{font-size:10px;color:var(--muted)}
.cell-c{text-align:center}
.neg{color:var(--red);font-weight:800}
.pos{color:var(--blue);font-weight:800}
.badge{border-radius:6px;padding:3px 9px;font-size:10px;font-weight:800;white-space:nowrap;display:inline-block}
.b-green{background:var(--green-soft);color:#166534}
.b-red{background:var(--red-soft);color:#991b1b}
.b-blue{background:var(--blue-soft);color:#1e40af}
.b-orange{background:var(--orange-soft);color:#9a3412;border:1px solid #fed7aa}
.b-gray{background:#f1f3f7;color:#475569}
.rank-pill{display:inline-flex;align-items:center;justify-content:center;width:23px;height:23px;
  border-radius:7px;font-size:10px;font-weight:800;color:#fff}
.icon-btn{border:1px solid var(--border);background:var(--white);border-radius:7px;width:30px;height:28px;
  cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s}
.icon-btn:hover{border-color:var(--blue);color:var(--blue)}

/* EMPTY */
.empty{padding:34px;text-align:center;color:var(--muted);font-size:13px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(31,37,48,.5);display:none;align-items:center;
  justify-content:center;z-index:200;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:var(--white);border-radius:18px;max-width:880px;width:100%;max-height:88vh;
  display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-hdr h2{font-size:17px;font-weight:800;color:var(--txt)}
.modal-hdr h2 b{color:var(--orange)}
.modal-close{margin-left:auto;border:none;background:var(--soft);width:32px;height:32px;border-radius:9px;
  cursor:pointer;font-size:15px;color:var(--muted)}
.modal-close:hover{background:var(--red-soft);color:var(--red)}
.modal-body{padding:20px 22px;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}

/* FORM */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-field{display:flex;flex-direction:column;gap:5px}
.form-field.full{grid-column:1/-1}
.form-field label{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.form-field input,.form-field select,.form-field textarea{padding:9px 11px;border-radius:var(--radius-sm);
  border:1px solid var(--border);font-size:13px;font-family:inherit;color:var(--txt);background:var(--white)}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{outline:2px solid var(--blue);border-color:var(--blue)}

/* store group block (pendientes por sucursal) */
.store-block{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:14px;overflow:hidden}
.store-block-hdr{display:flex;align-items:center;gap:10px;padding:11px 15px;background:var(--soft);border-bottom:1px solid var(--border)}
.store-block-hdr .sname{font-size:13.5px;font-weight:800;color:var(--txt)}
.store-block-hdr .scount{margin-left:auto;font-size:12px;font-weight:800;color:var(--red)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--txt);color:#fff;
  padding:11px 20px;border-radius:11px;font-size:13px;font-weight:600;z-index:400;opacity:0;
  transition:opacity .25s,transform .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}

@media(max-width:760px){
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
  .grid2{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}
}
@media(max-width:520px){
  nav.sidebar{width:52px}
  .content{padding:14px}
  .fg select,.fg input{min-width:110px}
}
#png-stage{position:fixed;left:-99999px;top:0}
/* ═══════════ LOGIN PAGE ═══════════ */
/* ════════ LOGIN PAGE — Corporate Kuroda ════════ */
#login-page{position:fixed;inset:0;background:var(--bg);display:flex;align-items:stretch;justify-content:center;z-index:9999;font-family:'Inter','Segoe UI',system-ui,sans-serif}
#login-page.hidden{display:none}
/* Panel izquierdo rojo */
.lp-panel{width:300px;min-width:300px;background:#DC2626;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:40px 32px;flex-shrink:0}
.lp-panel-logo{width:96px;height:96px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:18px;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.lp-panel-logo img{width:86px;height:86px;object-fit:contain}
.lp-panel-name{font-size:22px;font-weight:800;color:#fff;letter-spacing:.04em;margin-bottom:4px}
.lp-panel-div{width:56px;height:2px;background:#EF4444;margin-bottom:8px}
.lp-panel-tag{font-size:11px;color:#FECACA;text-align:center;line-height:1.5}
.lp-panel-foot{margin-top:auto;font-size:10px;color:#EF4444;letter-spacing:.08em;text-transform:uppercase}
/* Panel derecho formulario */
.lp-right{flex:1;display:flex;align-items:center;justify-content:center;padding:32px;background:var(--bg)}
.lp-card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:36px 36px 28px;width:100%;max-width:420px;display:flex;flex-direction:column}
.lp-title{font-size:26px;font-weight:800;color:var(--txt);letter-spacing:-.02em;margin-bottom:4px}
.lp-sub{font-size:12.5px;color:var(--muted);margin-bottom:0}
.lp-divider{height:1px;background:var(--border);margin:18px 0}
.lp-field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.lp-field label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.lp-field input{padding:9px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;color:var(--txt);transition:border .15s,box-shadow .15s;outline:none;background:#fff}
.lp-field input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
/* Campo contraseña con botón ojo */
.lp-pass-wrap{position:relative}
.lp-pass-wrap input{width:100%;padding-right:40px}
.lp-eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:2px;line-height:1;transition:color .15s}
.lp-eye:hover{color:var(--txt)}
